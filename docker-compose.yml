services:
  db:
    image: postgres:15-alpine
    container_name: senter-db
    environment:
      POSTGRES_USER: senter
      POSTGRES_PASSWORD: senter_dev
      POSTGRES_DB: senter_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/pg-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U senter -d senter_db"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
